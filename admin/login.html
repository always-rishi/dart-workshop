<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | DART Workshop</title>
    <link rel="stylesheet" href="../index.css">
    <style>
        .login-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-panel {
            width: 100%;
            max-width: 400px;
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand h1 {
            font-size: 2.5rem;
        }
    </style>
</head>

<body>

    <div class="container login-layout">
        <div class="glass-panel login-panel animate-fade-in">
            <div class="brand">
                <h1><span class="text-gradient">DART</span> Admin</h1>
                <p style="color: var(--text-secondary); margin-top: 8px;">Sign in to access the dashboard</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>

                <div id="login-error"
                    style="color: var(--error); font-size: 0.9rem; margin-bottom: 16px; display: none;">
                    Invalid credentials. Please try again.
                </div>

                <button type="submit" class="btn btn-primary" id="login-btn" style="width: 100%;">
                    <div class="loader" id="login-loader"></div>
                    <span id="login-text">Sign In</span>
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="../scripts/admin.js"></script>
</body>

</html>
